<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schema – Chefvy (Lokal med Veckor)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }

    /* BEHÅLLEN ORIGINALINLOGGNING FRÅN CHEF_SCHEMA.HTML */
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f5f3; }
    .login-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2.5rem 2rem; width: 320px; text-align: center; }
    .login-card .logo { font-size: 32px; color: #185FA5; margin-bottom: 1rem; }
    .login-card h1 { font-size: 18px; font-weight: 500; margin-bottom: 0.3rem; }
    .login-card p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .login-card input { width: 100%; font-size: 15px; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; text-align: center; }
    .login-card button { width: 100%; background: #185FA5; color: #E6F1FB; border: none; border-radius: 8px; padding: 10px; font-size: 15px; cursor: pointer; }
    .login-card button:hover { background: #0C447C; }
    .login-err { color: #A32D2D; font-size: 13px; margin-top: 8px; display: none; }

    /* DESIGN */
    #app { display: none; padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 12px; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar h1 { font-size: 20px; font-weight: 500; }
    .badge-chef { background: #B5D4F4; color: #042C53; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
    .nav-week { display: flex; align-items: center; gap: 8px; }
    .nav-week button { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
    .nav-week button:hover { background: #f0f0f0; }
    .week-label { font-size: 14px; color: #666; min-width: 160px; text-align: center; }
    .topbar-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    
    .refresh-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 14px; color: #666; display: flex; align-items: center; gap: 5px; }
    .refresh-btn:hover { background: #f0f8ff; border-color: #B5D4F4; color: #185FA5; }

    .add-btn { background: #185FA5; color: #E6F1FB; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .add-btn:hover { background: #0C447C; }
    .open-btn { background: #3B6D11; color: #EAF3DE; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .open-btn:hover { background: #27500A; }
    .logout-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 14px; color: #666; display: flex; align-items: center; gap: 5px; }
    .logout-btn:hover { background: #fef2f2; border-color: #f09595; color: #A32D2D; }

    .summary { display: flex; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .stat { background: #fff; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 90px; border: 1px solid #e5e5e5; }
    .stat .slabel { font-size: 12px; color: #888; }
    .stat .sval { font-size: 22px; font-weight: 500; }

    .schedule { border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; background: #fff; }
    .header-row { display: grid; grid-template-columns: 140px repeat(7, 1fr); background: #f9f9f7; border-bottom: 1px solid #e5e5e5; }
    .corner { border-right: 1px solid #e5e5e5; }
    .header-day { padding: 10px 4px; text-align: center; font-size: 12px; color: #888; border-right: 1px solid #e5e5e5; }
    .header-day:last-child { border-right: none; }
    .header-day.today { color: #185FA5; font-weight: 500; }
    .header-day .date-num { font-size: 18px; font-weight: 500; display: block; }
    
    .emp-row { display: grid; grid-template-columns: 140px repeat(7, 1fr); border-bottom: 1px solid #e5e5e5; min-height: 64px; }
    .emp-row:last-child { border-bottom: none; }
    .open-row { display: grid; grid-template-columns: 140px repeat(7, 1fr); border-top: 2px solid #e5e5e5; min-height: 64px; background: #fafff7; }
    .emp-name { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-right: 1px solid #e5e5e5; background: #fafafa; }
    .open-label { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-right: 1px solid #e5e5e5; background: #f0fae8; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
    .emp-info .name { font-size: 13px; font-weight: 500; }
    .emp-info .role { font-size: 11px; color: #888; }
    
    .day-cell { border-right: 1px solid #e5e5e5; padding: 4px; display: flex; flex-direction: column; gap: 3px; cursor: pointer; transition: background 0.15s; justify-content: center; }
    .day-cell:last-child { border-right: none; }
    .day-cell:hover { background: #f5f9ff; }
    .open-cell { border-right: 1px solid #e5e5e5; padding: 4px; display: flex; flex-direction: column; gap: 3px; cursor: pointer; justify-content: center; }
    .open-cell:last-child { border-right: none; }
    .open-cell:hover { background: #f0fae8; }

    .shift { border-radius: 6px; padding: 4px 7px; font-size: 11px; display: flex; align-items: center; justify-content: space-between; gap: 4px; }
    .shift .time { font-weight: 500; flex: 1; }
    .shift-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
    .shift:hover .shift-actions { opacity: 1; }
    .shift-btn { background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 3px; color: inherit; font-size: 12px; line-height: 1; }
    .shift-btn:hover { background: rgba(0,0,0,0.12); }
    .shift-btn.del:hover { background: rgba(180,0,0,0.15); }

    .open-shift { border-radius: 6px; padding: 4px 7px; font-size: 11px; background: #EAF3DE; color: #173404; border: 1.5px dashed #639922; display: flex; align-items: center; justify-content: space-between; gap: 4px; }
    .open-shift .otime { font-weight: 500; flex: 1; }
    .open-shift .interested { font-size: 10px; color: #3B6D11; font-style: italic; }
    .open-shift-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
    .open-shift:hover .open-shift-actions { opacity: 1; }

    .s-blue   { background: #B5D4F4; color: #042C53; }
    .s-green  { background: #C0DD97; color: #173404; }
    .s-amber  { background: #FAC775; color: #412402; }
    .s-purple { background: #CECBF6; color: #26215C; }
    .s-coral  { background: #F5C4B3; color: #4A1B0C; }
    .s-teal   { background: #9FE1CB; color: #04342C; }
    .empty-hint { font-size: 10px; color: #ccc; text-align: center; padding-top: 6px; }

    /* Modaler */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); align-items: center; justify-content: center; z-index: 200; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; border: 1px solid #e5e5e5; padding: 1.5rem; width: 360px; max-width: 95vw; }
    .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
    .field { margin-bottom: 12px; }
    .field label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    .field select, .field input[type="time"], .field input[type="text"] { width: 100%; font-size: 14px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; }
    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; justify-content: flex-end; }
    .modal-btns button { padding: 8px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-cancel { background: none; border: 1px solid #ddd; color: #333; }
    .btn-cancel:hover { background: #f0f0f0; }
    .btn-save { background: #185FA5; color: #E6F1FB; border: none; }
    .btn-save:hover { background: #0C447C; }
    .btn-save-green { background: #3B6D11; color: #EAF3DE; border: none; }
    .btn-save-green:hover { background: #27500A; }
    .btn-danger { background: #A32D2D; color: #FCEBEB; border: none; }
    .btn-danger:hover { background: #791F1F; }

    .interest-list { margin-top: 10px; }
    .interest-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: #f9f9f7; border-radius: 8px; margin-bottom: 6px; font-size: 13px; }
    .interest-item .iname { font-weight: 500; }
    .interest-item .itime { font-size: 11px; color: #888; }
    .assign-btn { background: #3B6D11; color: #EAF3DE; border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
    .assign-btn:hover { background: #27500A; }
    .no-interest { font-size: 13px; color: #888; font-style: italic; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 300; }
    .toast.show { opacity: 1; }
    .sync-status { font-size: 12px; color: #888; }

    /* NY RESPONSIV DESIGN FÖR MOBILER */
    @media (max-width: 768px) {
      #app { padding: 0.75rem; }
      
      .topbar { flex-direction: column; align-items: stretch; gap: 14px; }
      .topbar-left { justify-content: space-between; }
      .nav-week { justify-content: center; width: 100%; order: 2; }
      .topbar-right { justify-content: center; gap: 6px; }
      .topbar-right button { flex: 1; justify-content: center; font-size: 13px; padding: 10px 8px; }

      .summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat { padding: 10px; text-align: center; }
      .stat .sval { font-size: 18px; }

      .schedule { overflow-x: auto; -webkit-overflow-scrolling: touch; display: block; }
      .header-row, .emp-row, .open-row { min-width: 850px; }
      
      .login-card { width: 90%; max-width: 320px; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <div class="logo"><i class="ti ti-shield-lock"></i></div>
      <h1>Chefsportal</h1>
      <p>Logga in med administrativt lösenord</p>
      <input type="password" id="pw-input" placeholder="Lösenord" onkeydown="if(event.key==='Enter')login()">
      <button onclick="login()">Logga in</button>
      <div class="login-err" id="login-err">Felaktigt lösenord. Försök igen.</div>
    </div>
  </div>

  <div id="app">
    <div class="topbar">
      <div class="topbar-left">
        <i class="ti ti-calendar" style="font-size:22px;color:#185FA5"></i>
        <h1>Schemahantering</h1>
        <span class="badge-chef"><i class="ti ti-shield-check" style="font-size:11px"></i> Chefvy</span>
      </div>
      <div class="nav-week">
        <button onclick="changeWeek(-1)"><i class="ti ti-chevron-left"></i></button>
        <span class="week-label" id="week-label">Vecka --</span>
        <button onclick="changeWeek(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="topbar-right">
        <span class="sync-status" id="sync-status"></span>
        <button class="refresh-btn" onclick="loadAndRender()"><i class="ti ti-refresh"></i> Uppdatera</button>
        <button class="open-btn" onclick="openOpenModal()"><i class="ti ti-door-enter"></i> Ledigt pass</button>
        <button class="add-btn" onclick="openModal()"><i class="ti ti-plus"></i> Lägg till pass</button>
        <button class="logout-btn" onclick="logout()"><i class="ti ti-logout"></i> Logga ut</button>
      </div>
    </div>

    <div class="summary" id="summary"></div>

    <div class="schedule">
      <div class="header-row">
        <div class="corner"></div>
        <div class="header-day" id="hd0"></div><div class="header-day" id="hd1"></div>
        <div class="header-day" id="hd2"></div><div class="header-day" id="hd3"></div>
        <div class="header-day" id="hd4"></div><div class="header-day" id="hd5"></div>
        <div class="header-day" id="hd6"></div>
      </div>
      
      <div id="emp-rows"></div>
      
      <div class="open-row" id="open-row">
        <div class="open-label">
          <div class="avatar" style="background:#EAF3DE;color:#3B6D11"><i class="ti ti-door-enter" style="font-size:14px"></i></div>
          <div class="emp-info"><div class="name" style="color:#3B6D11">Lediga pass</div><div class="role">Klicka för att se intresse</div></div>
        </div>
        <div class="open-cell" id="oc0" onclick="openCellOpen(0)"></div>
        <div class="open-cell" id="oc1" onclick="openCellOpen(1)"></div>
        <div class="open-cell" id="oc2" onclick="openCellOpen(2)"></div>
        <div class="open-cell" id="oc3" onclick="openCellOpen(3)"></div>
        <div class="open-cell" id="oc4" onclick="openCellOpen(4)"></div>
        <div class="open-cell" id="oc5" onclick="openCellOpen(5)"></div>
        <div class="open-cell" id="oc6" onclick="openCellOpen(6)"></div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal-overlay" onclick="closeIfOutside(event,'modal')">
    <div class="modal">
      <h2 id="modal-title">Lägg till pass</h2>
      <div class="field"><label>Anställd</label><select id="sel-emp"></select></div>
      <div class="field">
        <label>Dag</label>
        <select id="sel-day">
          <option value="0">Måndag</option><option value="1">Tisdag</option>
          <option value="2">Onsdag</option><option value="3">Torsdag</option>
          <option value="4">Fredag</option><option value="5">Lördag</option>
          <option value="6">Söndag</option>
        </select>
      </div>
      <div class="time-row">
        <div class="field"><label>Starttid</label><input type="time" id="sel-start" value="08:00"></div>
        <div class="field"><label>Sluttid</label><input type="time" id="sel-end" value="16:00"></div>
      </div>
      <div class="field">
        <label>Färg</label>
        <select id="sel-color">
          <option value="s-blue">Blå</option><option value="s-green">Grön</option>
          <option value="s-amber">Gul</option><option value="s-purple">Lila</option>
          <option value="s-coral">Korall</option><option value="s-teal">Turkos</option>
        </select>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('modal')">Avbryt</button>
        <button id="modal-del-btn" style="display:none" class="btn-danger" onclick="deleteCurrentEdit()"><i class="ti ti-trash"></i> Ta bort pass</button>
        <button class="btn-save" onclick="saveShift()" id="modal-save-btn">Spara pass</button>
      </div>
    </div>
  </div>

  <div id="open-modal" class="modal-overlay" onclick="closeIfOutside(event,'open-modal')">
    <div class="modal">
      <h2>Lägg till ledigt pass</h2>
      <p style="font-size:13px;color:#666;margin-bottom:14px">Anställda kan intresseanmäla sig. Du tilldelar sedan passet.</p>
      <div class="field">
        <label>Dag</label>
        <select id="osel-day">
          <option value="0">Måndag</option><option value="1">Tisdag</option>
          <option value="2">Onsdag</option><option value="3">Torsdag</option>
          <option value="4">Fredag</option><option value="5">Lördag</option>
          <option value="6">Söndag</option>
        </select>
      </div>
      <div class="time-row">
        <div class="field"><label>Starttid</label><input type="time" id="osel-start" value="08:00"></div>
        <div class="field"><label>Sluttid</label><input type="time" id="osel-end" value="16:00"></div>
      </div>
      <div class="field"><label>Beskrivning (valfri)</label><input type="text" id="osel-desc" placeholder="t.ex. Lagerpass, Kassa..."></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('open-modal')">Avbryt</button>
        <button class="btn-save-green" onclick="saveOpenShift()"><i class="ti ti-door-enter"></i> Publicera pass</button>
      </div>
    </div>
  </div>

  <div id="interest-modal" class="modal-overlay" onclick="closeIfOutside(event,'interest-modal')">
    <div class="modal">
      <h2 id="imodal-title">Intresseanmälningar</h2>
      <p id="imodal-sub" style="font-size:13px;color:#666;margin-bottom:12px"></p>
      <div class="interest-list" id="interest-list"></div>
      <div class="modal-btns">
        <button id="imodal-del-btn" class="btn-danger" onclick="deleteOpenShift()"><i class="ti ti-trash"></i> Ta bort ledigt pass</button>
        <button class="btn-cancel" onclick="closeModal('interest-modal')">Stäng</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const CHEF_PASSWORD = "chef123";
    const SHIFTS_KEY = "schema_shifts_v2";
    const OPEN_KEY   = "schema_open_v2";

    const employees = [
      {id:1,name:"Anna S.",  role:"Kassör", color:"#CECBF6",tc:"#26215C"},
      {id:2,name:"Marcus L.",role:"Säljare",color:"#9FE1CB",tc:"#04342C"},
      {id:3,name:"Sara K.",  role:"Lager",  color:"#F5C4B3",tc:"#4A1B0C"},
      {id:4,name:"Erik H.",  role:"Säljare",color:"#FAC775",tc:"#412402"},
      {id:5,name:"Lena B.",  role:"Chef",   color:"#B5D4F4",tc:"#042C53"},
    ];

    const defaultShifts = [
      {id:1,emp:1,day:0,start:"08:00",end:"16:00",color:"s-blue",weekId:"2026-W25"},
      {id:2,emp:2,day:0,start:"14:00",end:"22:00",color:"s-teal",weekId:"2026-W25"},
      {id:3,emp:3,day:1,start:"07:00",end:"15:00",color:"s-coral",weekId:"2026-W25"},
      {id:4,emp:5,day:0,start:"09:00",end:"17:00",color:"s-blue",weekId:"2026-W25"},
      {id:5,emp:1,day:2,start:"08:00",end:"16:00",color:"s-blue",weekId:"2026-W25"},
      {id:6,emp:4,day:3,start:"12:00",end:"20:00",color:"s-amber",weekId:"2026-W25"},
      {id:7,emp:2,day:4,start:"08:00",end:"14:00",color:"s-teal",weekId:"2026-W25"},
      {id:8,emp:5,day:4,start:"09:00",end:"17:00",color:"s-blue",weekId:"2026-W25"},
      {id:10,emp:4,day:1,start:"08:00",end:"16:00",color:"s-amber",weekId:"2026-W25"},
    ];

    let shifts = [], openShifts = [], nextId = 20, nextOid = 100;
    let weekOffset = 0, editId = null, viewOpenId = null;

    function loadAndRender() {
      load();
      render();
      showToast("Schema uppdaterat!");
    }

    function load() {
      try { const d=localStorage.getItem(SHIFTS_KEY); shifts=d?JSON.parse(d):defaultShifts; } catch(e){shifts=defaultShifts;}
      try { const d=localStorage.getItem(OPEN_KEY); openShifts=d?JSON.parse(d):[]; } catch(e){openShifts=[];}
      nextId=Math.max(...shifts.map(s=>s.id),10)+1;
      nextOid=Math.max(...openShifts.map(s=>s.id),100)+1;
    }

    function saveAll() {
      localStorage.setItem(SHIFTS_KEY,JSON.stringify(shifts));
      localStorage.setItem(OPEN_KEY,JSON.stringify(openShifts));
      setSyncStatus("Sparat lokalt","#3B6D11");
      setTimeout(()=>setSyncStatus("",""),2000);
    }

    function setSyncStatus(msg,color){const el=document.getElementById("sync-status");el.textContent=msg;el.style.color=color||"#888";}

    function login() {
      if(document.getElementById("pw-input").value===CHEF_PASSWORD){
        document.getElementById("login-screen").style.display="none";
        document.getElementById("app").style.display="block";
        load(); render();
      } else {
        document.getElementById("login-err").style.display="block";
        document.getElementById("pw-input").value="";
      }
    }

    function logout(){
      document.getElementById("login-screen").style.display="flex";
      document.getElementById("app").style.display="none";
      document.getElementById("pw-input").value="";
      document.getElementById("login-err").style.display="none";
    }

    function initials(n){return n.split(" ").map(x=>x[0]).join("").toUpperCase();}
    const days=["Mån","Tis","Ons","Tor","Fre","Lör","Sön"];
    
    function getMon(o){const now=new Date(),dy=now.getDay(),diff=(dy===0?-6:1-dy),m=new Date(now);m.setDate(now.getDate()+diff+o*7);m.setHours(0,0,0,0);return m;}
    function fmtDate(d){return d.getDate()+"/"+(d.getMonth()+1);}
    function isToday(d){const t=new Date();t.setHours(0,0,0,0);return d.getTime()===t.getTime();}
    function getDur(s,e){const[sh,sm]=s.split(":").map(Number),[eh,em]=e.split(":").map(Number);return((eh*60+em)-(sh*60+sm))/60;}
    function getWeekNum(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-ys)/86400000)+1)/7);}
    
    function getWeekIdentifier(mondayDate) {
      const wNum = getWeekNum(mondayDate);
      return mondayDate.getFullYear() + "-W" + (wNum < 10 ? '0' + wNum : wNum);
    }

    function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}

    function render() {
      const mon=getMon(weekOffset);
      const currentWeekId = getWeekIdentifier(mon);
      
      const dates=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
      document.getElementById("week-label").textContent="Vecka "+getWeekNum(mon)+" · "+fmtDate(dates[0])+" – "+fmtDate(dates[6]);
      days.forEach((d,i)=>{
        const el=document.getElementById("hd"+i);
        el.innerHTML=`<span style="font-size:11px">${d}</span><span class="date-num">${dates[i].getDate()}</span>`;
        isToday(dates[i])?el.classList.add("today"):el.classList.remove("today");
      });
      document.getElementById("sel-emp").innerHTML=employees.map(e=>`<option value="${e.id}">${e.name}</option>`).join("");

      const activeShifts = shifts.filter(s => s.weekId === currentWeekId);
      const activeOpenShifts = openShifts.filter(s => s.weekId === currentWeekId);

      const rows=document.getElementById("emp-rows");
      rows.innerHTML=employees.map(emp=>{
        const cells=Array.from({length:7},(_,di)=>{
          const ds=activeShifts.filter(s=>s.emp===emp.id&&s.day===di);
          const html=ds.map(s=>`
            <div class="shift ${s.color}" onclick="openEdit(${s.id})">
              <span class="time">${s.start}–${s.end}</span>
              <span class="shift-actions">
                <button class="shift-btn" onclick="event.stopPropagation();openEdit(${s.id})" title="Redigera"><i class="ti ti-pencil" style="font-size:11px"></i></button>
                <button class="shift-btn del" onclick="event.stopPropagation();confirmDelete(${s.id})" title="Ta bort"><i class="ti ti-trash" style="font-size:11px"></i></button>
              </span>
            </div>`).join("");
          return `<div class="day-cell" onclick="openModalForCell(${emp.id},${di})">${html}${ds.length===0?'<div class="empty-hint">+ lägg till</div>':''}</div>`;
        });
        return `<div class="emp-row">
          <div class="emp-name">
            <div class="avatar" style="background:${emp.color};color:${emp.tc}">${initials(emp.name)}</div>
            <div class="emp-info"><div class="name">${emp.name}</div><div class="role">${emp.role}</div></div>
          </div>${cells.join("")}</div>`;
      }).join("");

      for(let di=0;di<7;di++){
        const cell=document.getElementById("oc"+di);
        const os=activeOpenShifts.filter(s=>s.day===di);
        cell.innerHTML=os.map(s=>{
          const cnt=s.interested?s.interested.length:0;
          return `<div class="open-shift" onclick="event.stopPropagation();viewInterest(${s.id})">
            <span class="otime">${s.start}–${s.end}${s.desc?' · '+s.desc:''}</span>
            <span class="open-shift-actions">
              <button class="shift-btn del" onclick="event.stopPropagation();deleteOpenShiftById(${s.id})" title="Ta bort"><i class="ti ti-trash" style="font-size:11px"></i></button>
            </span>
            ${cnt>0?`<span class="interested">${cnt} anmäld${cnt===1?'':'a'}</span>`:''}
          </div>`;
        }).join("")+(os.length===0?'<div class="empty-hint">+ ledigt pass</div>':'');
      }

      const total=activeShifts.length,hours=Math.round(activeShifts.reduce((a,s)=>a+getDur(s.start,s.end),0)),staffed=new Set(activeShifts.map(s=>s.day)).size,openCount=activeOpenShifts.length;
      document.getElementById("summary").innerHTML=`
        <div class="stat"><div class="slabel">Tilldelade pass</div><div class="sval">${total}</div></div>
        <div class="stat"><div class="slabel">Timmar</div><div class="sval">${hours}</div></div>
        <div class="stat"><div class="slabel">Bemannade dagar</div><div class="sval">${staffed}/7</div></div>
        <div class="stat"><div class="slabel">Lediga pass</div><div class="sval" style="color:#3B6D11">${openCount}</div></div>`;
    }

    function changeWeek(dir){weekOffset+=dir;render();}

    function openModal(empId=null,dayIdx=null){
      editId=null;
      document.getElementById("modal-title").textContent="Lägg till pass";
      document.getElementById("modal-save-btn").textContent="Spara pass";
      document.getElementById("modal-del-btn").style.display="none";
      if(empId) document.getElementById("sel-emp").value=empId;
      if(dayIdx!==null) document.getElementById("sel-day").value=dayIdx;
      document.getElementById("sel-start").value="08:00";
      document.getElementById("sel-end").value="16:00";
      document.getElementById("sel-color").value="s-blue";
      document.getElementById("modal").classList.add("open");
    }
    function openModalForCell(e,d){openModal(e,d);}
    
    function openEdit(id){
      const s=shifts.find(x=>x.id===id);if(!s)return;
      editId=id;
      document.getElementById("modal-title").textContent="Redigera pass";
      document.getElementById("modal-save-btn").textContent="Uppdatera";
      document.getElementById("modal-del-btn").style.display="inline-flex";
      document.getElementById("sel-emp").value=s.emp;
      document.getElementById("sel-day").value=s.day;
      document.getElementById("sel-start").value=s.start;
      document.getElementById("sel-end").value=s.end;
      document.getElementById("sel-color").value=s.color;
      document.getElementById("modal").classList.add("open");
    }
    function deleteCurrentEdit(){
      if(editId!==null){confirmDelete(editId);closeModal("modal");}
    }
    function confirmDelete(id){
      if(confirm("Ta bort detta pass?")){ shifts=shifts.filter(s=>s.id!==id);saveAll();render();showToast("Pass borttaget");}
    }
    function closeModal(id){document.getElementById(id).classList.remove("open");editId=null;viewOpenId=null;}
    function closeIfOutside(e,id){if(e.target.id===id)closeModal(id);}

    function saveShift(){
      const emp=parseInt(document.getElementById("sel-emp").value);
      const day=parseInt(document.getElementById("sel-day").value);
      const start=document.getElementById("sel-start").value;
      const end=document.getElementById("sel-end").value;
      const color=document.getElementById("sel-color").value;
      
      const mon=getMon(weekOffset);
      const weekId=getWeekIdentifier(mon);

      if(start>=end){alert("Sluttid måste vara efter starttid!");return;}
      
      if(editId!==null){
        const s=shifts.find(x=>x.id===editId);
        Object.assign(s,{emp,day,start,end,color});
        showToast("Pass uppdaterat");
      }
      else{
        shifts.push({id:nextId++,emp,day,start,end,color,weekId});
        showToast("Pass tillagt");
      }
      closeModal("modal");saveAll();render();
    }

    function openOpenModal(dayIdx=null){
      if(dayIdx!==null) document.getElementById("osel-day").value=dayIdx;
      document.getElementById("osel-start").value="08:00";
      document.getElementById("osel-end").value="16:00";
      document.getElementById("osel-desc").value="";
      document.getElementById("open-modal").classList.add("open");
    }
    function openCellOpen(di){ openOpenModal(di); }
    
    function saveOpenShift(){
      const day=parseInt(document.getElementById("osel-day").value);
      const start=document.getElementById("osel-start").value;
      const end=document.getElementById("osel-end").value;
      const desc=document.getElementById("osel-desc").value.trim();
      
      const mon=getMon(weekOffset);
      const weekId=getWeekIdentifier(mon);

      if(start>=end){alert("Sluttid måste vara efter starttid!");return;}
      
      openShifts.push({id:nextOid++,day,start,end,desc,weekId,interested:[]});
      closeModal("open-modal");saveAll();render();showToast("Ledigt pass publicerat");
    }

    function viewInterest(id){
      const s=openShifts.find(x=>x.id===id);if(!s)return;
      viewOpenId=id;
      document.getElementById("imodal-title").textContent="Ledigt pass · "+s.start+"–"+s.end+(s.desc?" · "+s.desc:"");
      document.getElementById("imodal-sub").textContent=days[s.day];
      const list=document.getElementById("interest-list");
      if(!s.interested||s.interested.length===0){
        list.innerHTML='<div class="no-interest">Inga intresseanmälningar ännu.</div>';
      } else {
        list.innerHTML=s.interested.map(i=>{
          const emp=employees.find(e=>e.id===i.empId);
          return `<div class="interest-item">
            <div>
              <div class="iname">${emp?emp.name:i.empId}</div>
              <div class="itime">Anmälde sig ${i.at}</div>
            </div>
            <button class="assign-btn" onclick="assignShift(${id},${i.empId})">Tilldela pass</button>
          </div>`;
        }).join("");
      }
      document.getElementById("interest-modal").classList.add("open");
    }

    function assignShift(openId, empId){
      const os=openShifts.find(x=>x.id===openId);if(!os)return;
      const empName = employees.find(e=>e.id===empId)?.name || "Anställd";
      
      if(confirm("Tilldela passet till "+empName+"?")){
        shifts.push({id:nextId++, emp:empId, day:os.day, start:os.start, end:os.end, color:"s-blue", weekId:os.weekId});
        
        if(os.interested) {
          os.interested = os.interested.filter(x => x.empId !== empId);
        }
        
        saveAll();
        render();
        viewInterest(openId);
        showToast("Pass tilldelat till " + empName + "!");
      }
    }
    
    function deleteOpenShift(){
      if(viewOpenId!==null&&confirm("Ta bort detta lediga pass?")){
        deleteOpenShiftById(viewOpenId);closeModal("interest-modal");
      }
    }
    function deleteOpenShiftById(id){
      openShifts=openShifts.filter(x=>x.id!==id);saveAll();render();showToast("Ledigt pass borttaget");
    }
  </script>
</body>
</html>
