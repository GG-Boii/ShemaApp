<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schema – Anställdvy (Live)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f5f3; }
    .login-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2.5rem 2rem; width: 320px; text-align: center; }
    .login-card .logo { font-size: 32px; color: #185FA5; margin-bottom: 1rem; }
    .login-card h1 { font-size: 18px; font-weight: 500; margin-bottom: 0.3rem; }
    .login-card p { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .login-card input { width: 100%; font-size: 15px; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; text-align: center; }
    .login-card button { width: 100%; background: #185FA5; color: #E6F1FB; border: none; border-radius: 8px; padding: 10px; font-size: 15px; cursor: pointer; }
    .login-card button:hover { background: #0C447C; }
    .login-err { color: #A32D2D; font-size: 13px; margin-top: 8px; display: none; }
    #app { display: none; max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 12px; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar h1 { font-size: 20px; font-weight: 500; }
    .badge-ro { background: #C0DD97; color: #173404; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
    .nav-week { display: flex; align-items: center; gap: 8px; }
    .nav-week button { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 14px; }
    .nav-week button:hover { background: #f0f0f8; }
    .week-label { font-size: 14px; color: #666; min-width: 160px; text-align: center; }
    .topbar-right { display: flex; gap: 8px; }
    .refresh-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 14px; color: #666; display: flex; align-items: center; gap: 5px; }
    .refresh-btn:hover { background: #f0f8ff; border-color: #B5D4F4; color: #185FA5; }
    .logout-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 14px; color: #666; display: flex; align-items: center; gap: 5px; }
    .logout-btn:hover { background: #fef2f2; border-color: #f09595; color: #A32D2D; }
    .view-tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; border-bottom: 1px solid #e5e5e5; padding-bottom: 8px; }
    .tab-btn { background: none; border: none; padding: 8px 16px; font-size: 14px; font-weight: 500; color: #666; cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 6px; }
    .tab-btn:hover { background: #eef2f7; color: #1a1a1a; }
    .tab-btn.active { background: #185FA5; color: white; }
    .summary { display: flex; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .stat { background: #fff; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 90px; border: 1px solid #e5e5e5; }
    .stat .slabel { font-size: 12px; color: #888; }
    .stat .sval { font-size: 22px; font-weight: 500; }
    .readonly-notice { background: #f0f8ff; border: 1px solid #B5D4F4; border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: #042C53; display: flex; align-items: center; gap: 8px; }
    .view-content { display: none; }
    .view-content.active { display: block; }
    .schedule { border: 1px solid #e5e5e5; border-radius: 12px; overflow: hidden; background: #fff; }
    .header-row { display: grid; grid-template-columns: 140px repeat(7, 1fr); background: #f9f9f7; border-bottom: 1px solid #e5e5e5; }
    .corner { border-right: 1px solid #e5e5e5; }
    .header-day { padding: 10px 4px; text-align: center; font-size: 12px; color: #888; border-right: 1px solid #e5e5e5; }
    .header-day:last-child { border-right: none; }
    .header-day.today { color: #185FA5; font-weight: 500; }
    .header-day .date-num { font-size: 18px; font-weight: 500; display: block; }
    .emp-row { display: grid; grid-template-columns: 140px repeat(7, 1fr); border-bottom: 1px solid #e5e5e5; min-height: 60px; }
    .emp-row:last-child { border-bottom: none; }
    .emp-name { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-right: 1px solid #e5e5e5; background: #fafafa; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
    .emp-info .name { font-size: 13px; font-weight: 500; }
    .emp-info .role { font-size: 11px; color: #888; }
    .day-cell { border-right: 1px solid #e5e5e5; padding: 4px; display: flex; flex-direction: column; gap: 3px; justify-content: center; }
    .day-cell:last-child { border-right: none; }
    .shift { border-radius: 4px; padding: 4px 8px; font-size: 11px; }
    .shift .time { font-weight: 500; display: block; }
    .s-blue { background: #B5D4F4; color: #042C53; }
    .s-green { background: #C0DD97; color: #173404; }
    .s-amber { background: #FAC775; color: #412402; }
    .s-purple { background: #CECBF6; color: #26215C; }
    .s-coral { background: #F5C4B3; color: #4A1B0C; }
    .s-teal { background: #9FE1CB; color: #04342C; }
    .empty-cell { font-size: 10px; color: #e5e5e5; text-align: center; padding: 8px 0; }
    .personal-dashboard { display: grid; grid-template-columns: 280px 1fr; gap: 20px; margin-top: 10px; }
    @media(max-width: 768px) { .personal-dashboard { grid-template-columns: 1fr; } }
    .personal-card { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: fit-content; }
    .personal-card .big-avatar { width: 64px; height: 64px; border-radius: 50%; font-size: 22px; font-weight: 500; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .personal-card h2 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .personal-card p { font-size: 13px; color: #888; margin-bottom: 15px; }
    .personal-card .personal-stat-box { background: #f9f9f7; width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #eee; }
    .personal-card .personal-stat-box .num { font-size: 24px; font-weight: 600; color: #185FA5; }
    .personal-card .personal-stat-box .lbl { font-size: 12px; color: #666; }
    .personal-list { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; }
    .personal-list h3 { font-size: 15px; font-weight: 500; margin-bottom: 15px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .shift-row-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #f0f0f0; background: #fafafa; }
    .shift-row-item:last-child { margin-bottom: 0; }
    .shift-day-info { display: flex; flex-direction: column; }
    .shift-day-info .day-name { font-weight: 600; font-size: 14px; }
    .shift-day-info .day-date { font-size: 12px; color: #888; }
    .shift-time-pill { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; }
    .no-shifts-msg { text-align: center; color: #aaa; padding: 30px 0; font-size: 14px; }
    .last-updated { font-size: 11px; color: #aaa; text-align: right; margin-top: 10px; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="logo"><i class="ti ti-user-check"></i></div>
    <h1>Personalinloggning</h1>
    <p>Skriv ditt förnamn (t.ex. anna, marcus)</p>
    <input type="text" id="user-input" placeholder="Ditt förnamn" onkeydown="if(event.key==='Enter')loginEmployee()">
    <button onclick="loginEmployee()">Logga in</button>
    <div class="login-err" id="login-err">Hittade ingen anställd med det namnet.</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <i class="ti ti-calendar" style="font-size:22px;color:#185FA5"></i>
      <h1>Schema</h1>
      <span class="badge-ro"><i class="ti ti-eye" style="font-size:11px"></i> Live Cloud</span>
    </div>
    <div class="nav-week">
      <button onclick="changeWeek(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="week-label" id="week-label">Laddar...</span>
      <button onclick="changeWeek(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="refreshData()"><i class="ti ti-refresh"></i> Uppdatera</button>
      <button class="logout-btn" onclick="logoutEmployee()"><i class="ti ti-logout"></i> Logga ut</button>
    </div>
  </div>

  <div class="readonly-notice">
    <i class="ti ti-info-circle" style="font-size:16px"></i>
    Du ser schemat live i läsläge. Kontakta din chef för att ändra pass.
  </div>

  <div class="view-tabs">
    <button class="tab-btn active" id="btn-tab-personal" onclick="switchView('personal')"><i class="ti ti-user"></i> Mitt schema</button>
    <button class="tab-btn" id="btn-tab-team" onclick="switchView('team')"><i class="ti ti-users"></i> Hela teamet</button>
  </div>

  <div id="view-personal" class="view-content active">
    <div class="personal-dashboard">
      <div class="personal-card" id="personal-profile-card"></div>
      <div class="personal-list" id="personal-shifts-list"></div>
    </div>
  </div>

  <div id="view-team" class="view-content">
    <div class="summary" id="summary"></div>
    <div class="schedule">
      <div class="header-row">
        <div class="corner"></div>
        <div class="header-day" id="hd0"></div>
        <div class="header-day" id="hd1"></div>
        <div class="header-day" id="hd2"></div>
        <div class="header-day" id="hd3"></div>
        <div class="header-day" id="hd4"></div>
        <div class="header-day" id="hd5"></div>
        <div class="header-day" id="hd6"></div>
      </div>
      <div id="emp-rows"></div>
    </div>
  </div>

  <div class="last-updated" id="last-updated"></div>
</div>

<script>
  // ==========================================
  // KOM IHÅG ATT KLISTRA IN DINA SUPABASE-NYCKLAR HÄR IGEN:
  // ==========================================
  const SUPABASE_URL = "https://qrscclhpmjjnvcgmwtaa.supabase.co/rest/v1/";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyc2NjbGhwbWpqbnZjZ213dGFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3Mjg5MTAsImV4cCI6MjA5NzMwNDkxMH0.z6kk3V9tr3i5L--XDChnfvZMRVMQt-Z0m9oh1yOVWIc";
  // ==========================================

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const employees = [
    { id: 1, name: "Anna S.",   role: "Kassör",  color: "#CECBF6", tc: "#26215C", user: "anna" },
    { id: 2, name: "Marcus L.",role: "Säljare", color: "#9FE1CB", tc: "#04342C", user: "marcus" },
    { id: 3, name: "Sara K.",  role: "Lager",   color: "#F5C4B3", tc: "#4A1B0C", user: "sara" },
    { id: 4, name: "Erik H.",  role: "Säljare", color: "#FAC775", tc: "#412402", user: "erik" },
    { id: 5, name: "Lena B.",  role: "Chef",    color: "#B5D4F4", tc: "#042C53", user: "lena" },
  ];

  let shifts = [];
  let weekOffset = 0;
  let currentView = 'personal';
  let loggedInEmpId = null;
  let isListening = false;

  async function fetchShiftsFromCloud() {
    try {
      const { data, error } = await supabaseClient.from('shifts').select('*');
      if (!error && data) {
        shifts = data;
        render();
      }
    } catch (err) {
      console.error("Fel vid hämtning:", err);
    }
  }

  function setupRealtimeListener() {
    if (isListening) return;
    isListening = true;

    supabaseClient
      .channel('schema-changes-emp')
      .on('postgres_changes', { event: '*', table: 'shifts', schema: 'public' }, () => {
        fetchShiftsFromCloud();
      })
      .subscribe();
  }

  function loginEmployee() {
    const input = document.getElementById("user-input").value.trim().toLowerCase();
    const found = employees.find(e => e.user === input);
    
    if (found) {
      loggedInEmpId = found.id;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("login-err").style.display = "none";
      switchView('personal');
      fetchShiftsFromCloud();
      setupRealtimeListener();
    } else {
      document.getElementById("login-err").style.display = "block";
    }
  }

  function logoutEmployee() {
    loggedInEmpId = null;
    document.getElementById("user-input").value = "";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }

  function initials(n) { return n.split(" ").map(x=>x[0]).join("").toUpperCase(); }
  const days = ["Mån","Tis","Ons","Tor","Fre","Lör","Sön"];
  const fullDays = ["Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag","Söndag"];

  function getMondayOfWeek(offset) {
    const now=new Date(); const day=now.getDay();
    const diff=(day===0?-6:1-day); const mon=new Date(now);
    mon.setDate(now.getDate()+diff+offset*7); mon.setHours(0,0,0,0); return mon;
  }
  function formatDate(d) { return d.getDate()+"/"+(d.getMonth()+1); }
  function isToday(d) { const t=new Date(); t.setHours(0,0,0,0); return d.getTime()===t.getTime(); }
  function getDuration(s,e) {
    const [sh,sm]=s.split(":").map(Number); const [eh,em]=e.split(":").map(Number);
    return ((eh*60+em)-(sh*60+sm))/60;
  }
  function getWeekIdentifier(d) {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dn = date.getUTCDay() || 7; date.setUTCDate(date.getUTCDate() + 4 - dn);
    const ys = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    const wNum = Math.ceil((((date - ys) / 86400000) + 1) / 7);
    return date.getUTCFullYear() + "-W" + wNum;
  }

  function refreshData() {
    fetchShiftsFromCloud();
  }

  function switchView(view) {
    currentView = view;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
    
    if(view === 'team') {
      document.getElementById('btn-tab-team').classList.add('active');
      document.getElementById('view-team').classList.add('active');
      render();
    } else {
      document.getElementById('btn-tab-personal').classList.add('active');
      document.getElementById('view-personal').classList.add('active');
      renderPersonalView();
    }
  }

  function render() {
    if (!loggedInEmpId) return;

    const mon=getMondayOfWeek(weekOffset);
    const currentWeekId = getWeekIdentifier(mon);
    const dates=Array.from({length:7},(_,i)=>{const d=new Date(mon); d.setDate(mon.getDate()+i); return d;});
    
    document.getElementById("week-label").textContent="Vecka "+currentWeekId.split("-W")[1]+" · "+formatDate(dates[0])+" – "+formatDate(dates[6]);
    
    days.forEach((d,i)=>{
      const el=document.getElementById("hd"+i);
      if(el) {
        el.innerHTML=`<span style="font-size:11px">${d}</span><span class="date-num">${dates[i].getDate()}</span>`;
        isToday(dates[i])?el.classList.add("today"):el.classList.remove("today");
      }
    });

    const rows=document.getElementById("emp-rows");
    if(rows) {
      rows.innerHTML=employees.map(emp=>{
        const cells=Array.from({length:7},(_,di)=>{
          const ds=shifts.filter(s=>s.emp===emp.id&&s.day===di&&s.weekId===currentWeekId);
          const html=ds.map(s=>`<div class="shift ${s.color}"><span class="time">${s.start}–${s.end}</span></div>`).join("");
          return `<div class="day-cell">${html}${ds.length===0?'<div class="empty-cell">–</div>':''}</div>`;
        });
        return `<div class="emp-row">
          <div class="emp-name">
            <div class="avatar" style="background:${emp.color};color:${emp.tc}">${initials(emp.name)}</div>
            <div class="emp-info"><div class="name">${emp.name}</div><div class="role">${emp.role}</div></div>
          </div>${cells.join("")}</div>`;
      }).join("");
    }

    const weekShifts = shifts.filter(s => s.weekId === currentWeekId);
    const total=weekShifts.length;
    const hours=Math.round(weekShifts.reduce((a,s)=>a+getDuration(s.start,s.end),0));
    const staffed=new Set(weekShifts.map(s=>s.day)).size;
    
    const summaryEl = document.getElementById("summary");
    if(summaryEl) {
      summaryEl.innerHTML=`
        <div class="stat"><div class="slabel">Pass</div><div class="sval">${total}</div></div>
        <div class="stat"><div class="slabel">Timmar</div><div class="sval">${hours}</div></div>
        <div class="stat"><div class="slabel">Bemannade dagar</div><div class="sval">${staffed}/7</div></div>
        <div class="stat"><div class="slabel">Personal</div><div class="sval">${employees.length}</div></div>`;
    }

    renderPersonalView();
    document.getElementById("last-updated").textContent="Live-synkad · Uppdaterat: "+new Date().toLocaleTimeString("sv-SE");
  }

  function renderPersonalView() {
    if (!loggedInEmpId) return;
    const emp = employees.find(e => e.id === loggedInEmpId);
    if(!emp) return;

    const mon = getMondayOfWeek(weekOffset);
    const currentWeekId = getWeekIdentifier(mon);
    const dates = Array.from({length:7},(_,i)=>{const d=new Date(mon); d.setDate(mon.getDate()+i); return d;});

    const myShifts = shifts.filter(s => s.emp === emp.id && s.weekId === currentWeekId).sort((a,b) => a.day - b.day);
    const myHours = Math.round(myShifts.reduce((a,s) => a + getDuration(s.start, s.end), 0));

    document.getElementById("personal-profile-card").innerHTML = `
      <div class="big-avatar" style="background:${emp.color};color:${emp.tc}">${initials(emp.name)}</div>
      <h2>${emp.name}</h2>
      <p>${emp.role}</p>
      <div class="personal-stat-box">
        <div class="num">${myHours} tim</div>
        <div class="lbl">Inplanerat denna vecka</div>
      </div>
    `;

    let listHtml = `<h3>Dina arbetspass</h3>`;
    if(myShifts.length === 0) {
      listHtml += `<div class="no-shifts-msg"><i class="ti ti-calendar-off" style="font-size:24px;display:block;margin-bottom:8px;"></i>Du är ledig denna vecka!</div>`;
    } else {
      listHtml += myShifts.map(s => {
        return `
          <div class="shift-row-item">
            <div class="shift-day-info">
              <span class="day-name">${fullDays[s.day]}</span>
              <span class="day-date">${dates[s.day].getDate()} ${dates[s.day].toLocaleString('sv-SE', {month: 'short'})}</span>
            </div>
            <div class="shift-time-pill ${s.color}">
              <i class="ti ti-clock"></i> ${s.start} – ${s.end}
            </div>
          </div>
        `;
      }).join("");
    }
    document.getElementById("personal-shifts-list").innerHTML = listHtml;
  }

  function changeWeek(dir) { weekOffset+=dir; render(); }
</script>
</body>
</html>
